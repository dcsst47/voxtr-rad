<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Voxtr Rad — Radiology + Laboratory Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a0e1a;
    --bg-2: #0f1526;
    --card: #131a2e;
    --card-2: #182140;
    --border: #23305a;
    --text: #e6ecf5;
    --muted: #7a8ba7;
    --dim: #a8b5cd;
    --accent: #00d9c8;
    --accent-dim: #009d90;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #60a5fa;
    --alert-bg: rgba(239, 68, 68, 0.10);
    --alert-border: rgba(239, 68, 68, 0.55);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  button { font-family: inherit; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 24px;
    padding: 14px 24px;
    background: linear-gradient(180deg, #0d1424 0%, #0a0e1a 100%);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
    color: #041418; font-weight: 900; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0, 217, 200, 0.35);
  }
  .brand-name { font-weight: 800; font-size: 15px; letter-spacing: 1.5px; }
  .brand-tag { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

  .role-tabs { display: flex; gap: 4px; margin-left: 24px; }
  .role-tabs button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  .role-tabs button:hover { color: var(--text); background: var(--card); }
  .role-tabs button.active {
    background: var(--card-2);
    color: var(--accent);
    border-color: var(--border);
  }

  .live { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); letter-spacing: 0.8px; }
  .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 12px var(--success);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* Layout */
  main { padding: 24px; max-width: 1680px; margin: 0 auto; }
  .grid { display: grid; gap: 16px; }
  .grid-3 { grid-template-columns: 340px 1fr 420px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-4-stats { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 1200px) {
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-4-stats { grid-template-columns: repeat(2, 1fr); }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card h3 {
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 14px 0;
    font-weight: 700;
  }
  .card h2 { font-size: 18px; font-weight: 700; margin: 0 0 6px 0; }
  .subtle { color: var(--muted); font-size: 12px; }

  /* Stats */
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }
  .stat-value {
    font-size: 30px;
    font-weight: 800;
    margin-top: 8px;
    line-height: 1;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .stat-sub { color: var(--muted); font-size: 12px; margin-top: 6px; }

  /* Worklist */
  .worklist { display: flex; flex-direction: column; gap: 8px; max-height: 780px; overflow-y: auto; padding-right: 4px; }
  .worklist-item {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--card-2);
  }
  .worklist-item:hover { border-color: var(--accent-dim); transform: translateX(2px); }
  .worklist-item.active { border-color: var(--accent); background: rgba(0, 217, 200, 0.08); }
  .worklist-item .name { font-weight: 600; font-size: 14px; }
  .worklist-item .meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    background: var(--card);
    color: var(--muted);
  }
  .pill.urgent { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
  .pill.stat-flag { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
  .pill.ok { background: rgba(34, 197, 94, 0.15); color: #86efac; }
  .pill.ai { background: rgba(0, 217, 200, 0.12); color: var(--accent); }
  .pill.info { background: rgba(96, 165, 250, 0.15); color: #93c5fd; }

  /* Image viewer */
  .imgbox {
    aspect-ratio: 4 / 3;
    background: #050a15;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; letter-spacing: 1.2px;
    position: relative;
    overflow: hidden;
  }
  .imgbox svg { width: 100%; height: 100%; display: block; }
  .imgbox-label {
    position: absolute; top: 8px; left: 10px;
    font-size: 9px; letter-spacing: 1.5px; color: rgba(0,217,200,0.7);
    background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 3px;
    z-index: 2;
  }

  /* Findings + pathway */
  .findings {
    padding: 14px; border-left: 3px solid var(--accent); background: rgba(0, 217, 200, 0.05);
    border-radius: 4px; margin-top: 12px;
  }
  .findings .head { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--accent); letter-spacing: 0.8px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
  .findings p { margin: 0; line-height: 1.55; }

  .pathway {
    margin-top: 16px;
    padding: 16px;
    background: linear-gradient(135deg, rgba(0, 217, 200, 0.06) 0%, rgba(96, 165, 250, 0.04) 100%);
    border: 1px solid rgba(0, 217, 200, 0.25);
    border-radius: 10px;
  }
  .pathway .head {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--accent); letter-spacing: 0.8px;
    text-transform: uppercase; font-weight: 800; margin-bottom: 4px;
  }
  .pathway .rule { color: var(--dim); font-size: 12px; line-height: 1.5; margin: 4px 0 14px; font-style: italic; }
  .pathway ol { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; counter-reset: step; }
  .pathway li {
    display: grid; grid-template-columns: 28px 1fr; gap: 10px; align-items: baseline;
    padding: 8px 12px;
    background: var(--card-2);
    border-radius: 8px;
    border: 1px solid var(--border);
    counter-increment: step;
  }
  .pathway li::before {
    content: counter(step);
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent-dim); color: #041418;
    font-weight: 800; font-size: 11px;
  }
  .pathway .step { font-size: 13px; line-height: 1.4; }
  .pathway .step .cadence { color: var(--muted); font-size: 11px; margin-top: 2px; }

  /* Contrast safety alert */
  .alert-contrast {
    margin-top: 12px;
    padding: 14px 16px;
    background: var(--alert-bg);
    border: 1px solid var(--alert-border);
    border-left: 4px solid var(--danger);
    border-radius: 10px;
  }
  .alert-contrast .head {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; letter-spacing: 1.2px;
    color: #fca5a5;
    text-transform: uppercase;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .alert-contrast .head::before {
    content: '⚠';
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--danger); color: #fff; font-size: 13px;
  }
  .alert-contrast .reason { font-size: 13px; color: #fecaca; margin-bottom: 10px; line-height: 1.5; }
  .alert-contrast .alts { padding-left: 18px; margin: 0; font-size: 12px; color: #f5f5f5; }
  .alert-contrast .alts li { margin: 3px 0; }
  .alert-contrast .also { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(239, 68, 68, 0.35); font-size: 12px; color: #fed7aa; }

  .alert-safe {
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.35);
    border-left: 4px solid var(--success);
    border-radius: 10px;
    font-size: 13px;
  }

  /* Lab panel */
  .lab-panel { border-collapse: collapse; width: 100%; font-size: 13px; margin-top: 8px; }
  .lab-panel th, .lab-panel td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .lab-panel th { font-size: 10px; letter-spacing: 0.8px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
  .lab-panel .val { font-family: 'SF Mono', Menlo, Consolas, monospace; font-weight: 600; }
  .lab-panel .ref { font-family: 'SF Mono', Menlo, Consolas, monospace; color: var(--muted); font-size: 11px; }
  .lab-panel tr.flag-high td { background: rgba(239, 68, 68, 0.06); }
  .lab-panel tr.flag-low td { background: rgba(245, 158, 11, 0.06); }
  .lab-panel .flag-badge {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  }
  .lab-panel .flag-badge.HIGH { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
  .lab-panel .flag-badge.LOW { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
  .lab-note { font-size: 11px; color: var(--dim); font-style: italic; margin-top: 4px; }

  /* Timeline */
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {
    content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px;
    width: 2px; background: var(--border);
  }
  .timeline-item { position: relative; padding: 0 0 16px 20px; }
  .timeline-item::before {
    content: ''; position: absolute; left: -20px; top: 6px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px rgba(0, 217, 200, 0.5);
    border: 3px solid var(--bg);
  }
  .timeline-date { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .timeline-title { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .timeline-body { font-size: 13px; color: #cbd5e1; margin-top: 4px; line-height: 1.5; }

  /* Comms log */
  .comms { display: flex; flex-direction: column; gap: 8px; }
  .comm-item {
    padding: 10px 12px;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
  }
  .comm-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .comm-lang { font-size: 10px; padding: 2px 6px; background: var(--card); border-radius: 4px; color: var(--muted); }
  .comm-time { color: var(--muted); font-size: 10px; }
  .comm-body { color: #cbd5e1; }

  /* Clinic ops */
  .flagged-row {
    display: grid; grid-template-columns: 100px 160px 1fr;
    gap: 12px; align-items: center;
    padding: 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .flagged-row:last-child { border-bottom: none; }
  .flagged-row .wid { font-family: 'SF Mono', Menlo, monospace; font-size: 12px; color: var(--muted); }

  /* Modality mix bars */
  .mmix { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .mmix-row { display: grid; grid-template-columns: 100px 1fr 40px; gap: 12px; align-items: center; font-size: 12px; }
  .mmix-bar { background: var(--card-2); height: 8px; border-radius: 4px; overflow: hidden; }
  .mmix-fill { background: linear-gradient(90deg, var(--accent-dim), var(--accent)); height: 100%; }
  .mmix .count { font-family: 'SF Mono', Menlo, monospace; text-align: right; color: var(--dim); }

  /* Agent activity */
  .agent-panel {
    padding: 14px 16px;
    background: linear-gradient(135deg, rgba(0, 217, 200, 0.05) 0%, rgba(96, 165, 250, 0.03) 100%);
    border: 1px solid rgba(0, 217, 200, 0.30);
    border-radius: 10px;
    margin-top: 12px;
  }
  .agent-panel .head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .agent-panel .head .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 1.2px; color: var(--accent);
    text-transform: uppercase; font-weight: 800;
  }
  .agent-panel .head .badge::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s infinite;
  }
  .agent-panel .subhead { font-size: 11px; color: var(--muted); margin-left: auto; }
  .agent-item {
    display: grid; grid-template-columns: 46px 78px 1fr;
    gap: 10px; align-items: baseline;
    padding: 6px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    font-size: 12px;
  }
  .agent-item:last-child { border-bottom: none; }
  .agent-item .time { font-family: 'SF Mono', Menlo, Consolas, monospace; color: var(--muted); font-size: 11px; }
  .agent-item .src {
    font-size: 9px; letter-spacing: 0.8px;
    padding: 2px 6px; border-radius: 3px; text-align: center;
    text-transform: uppercase; font-weight: 700;
  }
  .agent-item .src.PACS { background: rgba(0, 217, 200, 0.15); color: var(--accent); }
  .agent-item .src.LIS { background: rgba(96, 165, 250, 0.15); color: var(--info); }
  .agent-item .src.WhatsApp { background: rgba(34, 197, 94, 0.15); color: #86efac; }
  .agent-item .src.Portal { background: rgba(167, 139, 250, 0.15); color: #c4b5fd; }
  .agent-item .src.AI, .agent-item .src.AIdecision { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
  .agent-item .src.Order, .agent-item .src.Orderentry { background: rgba(148, 163, 184, 0.15); color: var(--dim); }
  .agent-item .src.MoH { background: rgba(239, 68, 68, 0.12); color: #fca5a5; }
  .agent-item .action { color: #dbe5f2; line-height: 1.4; }
  .agent-item .action.safety { color: #fca5a5; font-weight: 600; }

  /* Agent alerts strip */
  .alert-strip {
    display: flex; gap: 10px; overflow-x: auto;
    padding: 12px 0; margin-bottom: 16px;
  }
  .alert-card {
    flex: 0 0 auto; min-width: 340px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    font-size: 12px;
  }
  .alert-card.safety { border-left-color: var(--danger); }
  .alert-card.tb { border-left-color: var(--warning); }
  .alert-card .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .alert-card .top .time { font-family: 'SF Mono', Menlo, monospace; color: var(--muted); font-size: 10px; }
  .alert-card .patient { font-weight: 600; color: var(--text); }
  .alert-card .body { color: #dbe5f2; margin-top: 4px; line-height: 1.4; }

  /* Loading */
  .loading { padding: 60px; text-align: center; color: var(--muted); }

  /* Section head */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 12px; }
  .section-head h1 { font-size: 22px; font-weight: 700; margin: 0; }
  .section-head p { color: var(--muted); font-size: 13px; margin: 4px 0 0; }

  hr.sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* Footer */
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; margin-top: 32px;
    border-top: 1px solid var(--border);
    color: var(--muted); font-size: 11px; letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">V</div>
    <div>
      <div class="brand-name">VOXTR RAD</div>
      <div class="brand-tag">RADIOLOGY + LABORATORY INTELLIGENCE</div>
    </div>
  </div>
  <nav class="role-tabs" id="roleTabs">
    <button data-role="radiologist" class="active">Radiologist</button>
    <button data-role="physician">Physician</button>
    <button data-role="coordinator">Coordinator</button>
    <button data-role="ops">Clinic Ops</button>
  </nav>
  <div class="live"><span class="pulse"></span> LIVE · voice channel connected</div>
</header>

<main id="main">
  <div class="loading">Loading…</div>
</main>

<div class="footer">
  <div>voxtr-rad · synthetic data · no PHI</div>
  <div id="clock"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else if (v !== undefined && v !== null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c === null || c === undefined || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
};
const fmtDate = (d) => new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${path} → ${r.status}`);
  return r.json();
}

// ─────────────────────────────────────────────────────────────
// Stylised SVG "medical images" per modality
// (visual anchors — not clinical accuracy)
// ─────────────────────────────────────────────────────────────
function svgCXR() {
  return `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="lung" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#2a3548" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0a0e1a"/>
        <stop offset="100%" stop-color="#050a15"/>
      </linearGradient>
    </defs>
    <rect width="400" height="300" fill="url(#bg1)"/>
    <ellipse cx="130" cy="145" rx="70" ry="105" fill="url(#lung)"/>
    <ellipse cx="270" cy="145" rx="70" ry="105" fill="url(#lung)"/>
    <path d="M200 30 L200 260" stroke="#1a2540" stroke-width="6" opacity="0.7"/>
    <path d="M195 220 Q200 240 240 245 L280 260" stroke="#2b3d5f" stroke-width="10" fill="none" opacity="0.8"/>
    <g stroke="#3a4c70" stroke-width="1" fill="none" opacity="0.5">
      <path d="M65 90 Q130 82 195 92"/>
      <path d="M60 110 Q130 100 200 112"/>
      <path d="M60 130 Q130 118 200 132"/>
      <path d="M60 150 Q130 138 200 152"/>
      <path d="M62 170 Q130 158 200 172"/>
      <path d="M65 190 Q130 178 200 192"/>
      <path d="M70 208 Q130 196 200 210"/>
      <path d="M200 92 Q265 82 335 90"/>
      <path d="M200 112 Q270 100 340 110"/>
      <path d="M200 132 Q270 118 340 130"/>
      <path d="M200 152 Q270 138 340 150"/>
      <path d="M200 172 Q270 158 338 170"/>
      <path d="M200 192 Q270 178 335 190"/>
      <path d="M200 210 Q270 196 330 208"/>
    </g>
  </svg>`;
}

function svgCXR_tb() {
  return `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="lungtb" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#2a3548"/>
        <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="400" height="300" fill="#050a15"/>
    <ellipse cx="130" cy="145" rx="70" ry="105" fill="url(#lungtb)"/>

const svgFor = (modality, bodyPart, finding) => {
  const m = (modality || '').toLowerCase();
  const b = (bodyPart || '').toLowerCase();
  const f = (finding || '').toLowerCase();
  if (m.includes('dexa')) return svgDEXA();
  if (m.includes('mri') && b.includes('knee')) return svgMRIKnee();
  if (m.includes('mri') && b.includes('lumbar')) return svgMRILumbar();
  if (m.includes('mri') && b.includes('brain')) return svgMRIBrain();
  if (m.includes('ct')) return svgCTChest();
  if ((m.includes('ultrasound') || m.includes('us')) && b.includes('obstetric')) return svgUSFetus();
  if (m.includes('ultrasound') || m.includes('us')) return svgUSAbdomen();
  if (m.includes('x-ray') && f.includes('reticulonodular')) return svgCXR_tb();
  return svgCXR();
};

let state = { role: 'radiologist', selectedMrn: null };

async function renderRadiologist() {
  const main = $('#main');
  main.innerHTML = '<div class="loading">Loading…</div>';

  const patients = await api('/api/patients');
  if (!state.selectedMrn) state.selectedMrn = patients[0].mrn;
  const patient = await api('/api/patient/' + state.selectedMrn);
  const safety = await api('/api/patient/' + state.selectedMrn + '/contrast-safety').catch(() => null);
  const latest = patient.priors[patient.priors.length - 1];

  main.innerHTML = '';
  main.appendChild(el('div', { class: 'section-head' },
    el('div', {},
      el('h1', {}, 'Reading Worklist'),
      el('p', {}, 'AI-triaged imaging + laboratory correlated at ingest. Priors and clinical pathway surfaced automatically.')
    ),
    el('div', { class: 'subtle' }, `Signed in as `, el('b', {}, 'Dr. S. Rashid · Musculoskeletal'))
  ));

  const grid = el('div', { class: 'grid grid-3' });
  main.appendChild(grid);

  // Worklist
  const worklistCard = el('div', { class: 'card' },
    el('h3', {}, `Worklist · ${patients.length} patients`),
    el('div', { class: 'worklist', id: 'worklist' })
  );
  const worklistEl = worklistCard.querySelector('#worklist');

  const priorityRank = (p) => {
    const f = (p.latest_study && p.latest_study.finding || '').toLowerCase();
    if (f.includes('contrast held') || f.includes('contraindicated')) return 0;
    if (f.includes('reticulonodular') || f.includes('tb')) return 0;
    if (f.includes('tear') || f.includes('nodule') || f.includes('cyst')) return 1;
    return 2;
  };
  const sorted = [...patients].sort((a, b) => priorityRank(a) - priorityRank(b));

  sorted.forEach((p) => {
    const finding = p.latest_study ? p.latest_study.finding : '';
    const modality = p.latest_study ? `${p.latest_study.modality} · ${p.latest_study.body_part}` : 'No prior';
    let pillClass = 'ok';
    let pillText = 'ROUTINE';
    if (/contraindicated|contrast held/i.test(finding)) { pillClass = 'urgent'; pillText = 'CONTRAST HOLD'; }
    else if (/reticulonodular|tb/i.test(finding)) { pillClass = 'urgent'; pillText = 'TB WORKUP'; }
    else if (/tear|nodule|cyst|stenosis|osteoporosis|steatosis/i.test(finding)) { pillClass = 'stat-flag'; pillText = 'REVIEW'; }

    const item = el('div', {
      class: 'worklist-item' + (p.mrn === state.selectedMrn ? ' active' : ''),
      onclick: () => { state.selectedMrn = p.mrn; renderRadiologist(); },
    },
      el('div', { class: 'name' }, `${p.name}  ·  MRN ${p.mrn}`),
      el('div', { class: 'meta' },
        el('span', { class: 'pill ai' }, 'AI-triaged'),
        el('span', {}, modality)
      ),
      el('div', { class: 'meta' },
        el('span', { class: 'pill ' + pillClass }, pillText),
        p.lab_flags && p.lab_flags.length
          ? el('span', { class: 'pill info' }, `${p.lab_flags.length} lab flag${p.lab_flags.length > 1 ? 's' : ''}`)
          : null
      )
    );
    worklistEl.appendChild(item);
  });
  grid.appendChild(worklistCard);

  // Current study (center)
  const studyCard = el('div', { class: 'card' });
  studyCard.appendChild(el('h3', {}, 'Current study'));
  studyCard.appendChild(el('h2', {}, `${latest.modality} · ${latest.body_part}`));
  studyCard.appendChild(el('div', { class: 'subtle' }, `${patient.name} · MRN ${patient.mrn} · ${patient.sex} · DOB ${patient.dob}`));

  const imgs = el('div', { class: 'grid grid-2', style: 'margin-top: 14px; gap: 10px;' },
    el('div', { class: 'imgbox', html: '<span class="imgbox-label">AX / PA</span>' + svgFor(latest.modality, latest.body_part, latest.finding) }),
    el('div', { class: 'imgbox', html: '<span class="imgbox-label">SAG / LAT</span>' + svgFor(latest.modality, latest.body_part, latest.finding) }),
  );
  studyCard.appendChild(imgs);

  studyCard.appendChild(el('div', { class: 'findings' },
    el('div', { class: 'head' }, `Voxtr AI-drafted note · ${latest.reader}`),
    el('p', {}, latest.finding)
  ));

  // Contrast safety alert (if this study involves contrast)
  const isContrastStudy = /contrast/i.test(latest.modality + ' ' + latest.body_part + ' ' + latest.finding);
  if (safety && safety.block) {
    studyCard.appendChild(renderContrastAlert(safety));
  } else if (safety && !safety.block && isContrastStudy) {
    studyCard.appendChild(el('div', { class: 'alert-safe' },
      el('b', {}, '✓ Contrast safety OK.'), ' ', safety.reason,
      safety.also && safety.also.length ? el('div', { style: 'margin-top: 6px; font-size: 12px; color: var(--dim);' }, safety.also.join(' · ')) : null
    ));
  }

  grid.appendChild(studyCard);

  // Right column: agent activity + labs + priors + pathway
  const rightCol = el('div', { class: 'card' });

  // Agent activity — what the AI did BEFORE the radiologist opened this study
  if (patient.agent_activity) {
    rightCol.appendChild(el('h3', {}, 'Voxtr Agent Activity · pre-read'));
    rightCol.appendChild(renderAgentPanel(patient.agent_activity, 'AI actions completed'));
  }

  // Labs
  if (patient.labs && patient.labs.results) {
    rightCol.appendChild(el('h3', { style: 'margin-top: 16px;' }, `Recent labs · ${fmtDate(patient.labs.panel_date)}`));
    rightCol.appendChild(renderLabPanel(patient.labs.results));
  }

  // Priors
  rightCol.appendChild(el('h3', { style: 'margin-top: 16px;' }, 'Priors surfaced by Voxtr'));
  patient.priors.forEach((pr) => {
    rightCol.appendChild(el('div', { class: 'timeline' },
      el('div', { class: 'timeline-item' },
        el('div', { class: 'timeline-date' }, `${fmtDate(pr.date)} · ${pr.reader}`),
        el('div', { class: 'timeline-title' }, `${pr.modality} · ${pr.body_part}`),
        el('div', { class: 'timeline-body' }, pr.finding)
      )
    ));
  });

  // Meds
  if (patient.medications && patient.medications.length) {
    rightCol.appendChild(el('h3', { style: 'margin-top: 16px;' }, 'Current meds'));
    patient.medications.forEach((m) => {
      rightCol.appendChild(el('div', { style: 'font-size: 13px; padding: 4px 0;' },
        el('b', {}, m.drug), ` · since ${fmtDate(m.started)}`,
        m.note ? el('div', { class: 'subtle', style: 'font-size: 11px; margin-top: 2px;' }, m.note) : null
      ));
    });
  }

  // Clinical pathway
  const pathway = latest.clinical_pathway;
  if (pathway) {
    rightCol.appendChild(renderPathway(pathway));
  }

  grid.appendChild(rightCol);
}

function renderLabPanel(results) {
  const table = el('table', { class: 'lab-panel' });
  const thead = el('thead', {},
    el('tr', {},
      el('th', {}, 'Test'),
      el('th', {}, 'Value'),
      el('th', {}, 'Ref range'),
      el('th', {}, 'Flag')
    )
  );
  table.appendChild(thead);
  const tbody = el('tbody', {});
  results.forEach((r) => {
    const tr = el('tr', { class: r.flag ? `flag-${r.flag.toLowerCase()}` : '' },
      el('td', {}, r.test),
      el('td', { class: 'val' }, `${r.value} ${r.unit}`),
      el('td', { class: 'ref' }, `${r.ref_low !== null && r.ref_low !== undefined ? r.ref_low : '–'} – ${r.ref_high !== null && r.ref_high !== undefined ? r.ref_high : '–'}`),
      el('td', {}, r.flag ? el('span', { class: 'flag-badge ' + r.flag }, r.flag) : '')
    );
    tbody.appendChild(tr);
    if (r.note) {
      tbody.appendChild(el('tr', {}, el('td', { colspan: '4', class: 'lab-note' }, r.note)));
    }
  });
  table.appendChild(tbody);
  return table;
}

function renderPathway(pathway) {
  const container = el('div', { class: 'pathway' });
  container.appendChild(el('div', { class: 'head' }, 'Clinical pathway'));
  if (pathway.clinical_context) {
    container.appendChild(el('div', { class: 'rule' }, pathway.clinical_context));
  }
  const ol = el('ol', {});
  (pathway.mandated_followups || []).forEach((f) => {
    ol.appendChild(el('li', {},
      el('div', { class: 'step' },
        f.step,
        f.cadence ? el('div', { class: 'cadence' }, f.cadence) : null,
        f.note ? el('div', { class: 'cadence' }, f.note) : null
      )
    ));
  });
  container.appendChild(ol);

  if (pathway.if_conservative_fails_pathway) {
    container.appendChild(el('div', { class: 'head', style: 'margin-top: 14px;' }, 'If conservative fails'));
    const ol2 = el('ol', {});
    pathway.if_conservative_fails_pathway.forEach((f) => {
      ol2.appendChild(el('li', {},
        el('div', { class: 'step' },
          f.step,
          f.cadence ? el('div', { class: 'cadence' }, f.cadence) : null,
          f.note ? el('div', { class: 'cadence' }, f.note) : null
        )
      ));
    });
    container.appendChild(ol2);
  }
  return container;
}

function renderAgentPanel(activity, title = 'Voxtr Agent Activity') {
  if (!activity || !activity.length) return null;
  const panel = el('div', { class: 'agent-panel' });
  panel.appendChild(el('div', { class: 'head' },
    el('div', { class: 'badge' }, title),
    el('div', { class: 'subhead' }, `Autonomous · ${activity.length} actions before you opened the record`)
  ));
  activity.forEach((a) => {
    const srcClass = (a.source || '').replace(/\s+/g, '').replace('AIdecision', 'AI');
    const isSafety = /block|safety gate|contraindication/i.test(a.action || '');
    panel.appendChild(el('div', { class: 'agent-item' },
      el('div', { class: 'time' }, a.time || ''),
      el('div', { class: 'src ' + srcClass }, (a.source || '').split(' ')[0]),
      el('div', { class: 'action' + (isSafety ? ' safety' : '') }, a.action || '')
    ));
  });
  return panel;
}

function renderContrastAlert(safety) {
  const div = el('div', { class: 'alert-contrast' });
  div.appendChild(el('div', { class: 'head' }, 'Contrast contraindication'));
  div.appendChild(el('div', { class: 'reason' }, safety.reason));
  if (safety.alternatives && safety.alternatives.length) {
    div.appendChild(el('div', { style: 'font-size: 11px; letter-spacing: 0.8px; color: #fca5a5; font-weight: 700; margin-bottom: 4px;' }, 'ALTERNATIVES'));
    const ul = el('ul', { class: 'alts' });
    safety.alternatives.forEach((a) => ul.appendChild(el('li', {}, a)));
    div.appendChild(ul);
  }
  if (safety.also && safety.also.length) {
    div.appendChild(el('div', { class: 'also' }, safety.also.join(' · ')));
  }
  return div;
}

    tl.appendChild(el('div', { class: 'timeline-item' },
      el('div', { class: 'timeline-date' }, `${fmtDate(pr.date)} · ${pr.reader}`),
      el('div', { class: 'timeline-title' }, `${pr.modality} · ${pr.body_part}`),
      el('div', { class: 'timeline-body' }, pr.finding)
    ));
  });
  left.appendChild(tl);

  if (patient.notes && patient.notes.length) {
    left.appendChild(el('h3', {}, 'Clinical notes'));
    patient.notes.forEach((n) => {
      left.appendChild(el('div', { class: 'timeline' },
        el('div', { class: 'timeline-item' },
          el('div', { class: 'timeline-date' }, `${fmtDate(n.date)} · ${n.author}`),
          el('div', { class: 'timeline-body' }, n.summary)
        )
      ));
    });
  }

  if (patient.medications && patient.medications.length) {
    left.appendChild(el('h3', {}, 'Current medications'));
    patient.medications.forEach((m) => {
      left.appendChild(el('div', { style: 'font-size: 13px; padding: 4px 0;' },
        el('b', {}, m.drug), ` · since ${fmtDate(m.started)}`,
        m.note ? el('div', { class: 'subtle', style: 'font-size: 11px; margin-top: 2px;' }, m.note) : null
      ));
    });
  }

  grid.appendChild(left);

  // Right: agent activity FIRST, then correlated view, labs, pathway
  const right = el('div', { class: 'card' });

  // What the AI did before you opened this record
  if (patient.agent_activity) {
    right.appendChild(el('h3', {}, 'Voxtr Agent Activity · this patient'));
    right.appendChild(renderAgentPanel(patient.agent_activity, 'AI actions completed'));
    right.appendChild(el('div', { class: 'subtle', style: 'font-size: 11px; margin-top: 6px; font-style: italic;' },
      'All actions above ran autonomously. You did not have to ask.'));
  }

  right.appendChild(el('h3', { style: 'margin-top: 16px;' }, 'Correlated view — imaging + labs'));
  const latest = patient.priors[patient.priors.length - 1];
  right.appendChild(el('h2', {}, latest.finding));

  if (safety && safety.block) right.appendChild(renderContrastAlert(safety));

  if (patient.labs && patient.labs.results) {
    right.appendChild(el('h3', { style: 'margin-top: 14px;' }, `Labs · ${fmtDate(patient.labs.panel_date)}`));
    right.appendChild(renderLabPanel(patient.labs.results));
  }

  if (latest.clinical_pathway) right.appendChild(renderPathway(latest.clinical_pathway));

  grid.appendChild(right);
  main.appendChild(grid);
}

// ─────────────────────────────────────────────────────────────
async function renderClinicOps() {
  const main = $('#main');
  main.innerHTML = '<div class="loading">Loading…</div>';

  const clinic = await api('/api/clinic/main_clinic');

  main.innerHTML = '';
  main.appendChild(el('div', { class: 'section-head' },
    el('div', {},
      el('h1', {}, 'Clinic Operations'),
      el('p', {}, 'Throughput · AI-triage agreement · priority review queue. Clinical ops only.')
    ),
    el('div', { class: 'subtle' }, `Viewing `, el('b', {}, `${clinic.clinic} · ${clinic.period}`))
  ));

  main.appendChild(el('div', { class: 'grid grid-4-stats', style: 'margin-bottom: 16px;' },
    stat('Studies', clinic.total_studies.toLocaleString(), clinic.period),
    stat('Routine cleared', clinic.routine_cleared.toLocaleString(), `${(clinic.first_pass_ai_agreement * 100).toFixed(0)}% AI first-pass`),
    stat('Flagged for review', clinic.flagged_for_review.toString(), Object.keys(clinic.flag_breakdown).map(k => k.replace(/_/g,' ')).join(' · ')),
    stat('Avg TAT', `${clinic.average_tat_hours}h`, 'Study → signed report'),
  ));

  const grid = el('div', { class: 'grid grid-2' });

  // Left: priority review queue
  const left = el('div', { class: 'card' });
  left.appendChild(el('h3', {}, 'Priority review queue'));
  clinic.priority_review_queue.forEach((w) => {
    let pillClass = 'stat-flag';
    if (w.flag.toLowerCase().includes('contrast')) pillClass = 'urgent';
    if (w.flag.toLowerCase().includes('tb')) pillClass = 'urgent';
    left.appendChild(el('div', { class: 'flagged-row' },
      el('div', { class: 'wid' }, w.patient_ref),
      el('div', {}, el('span', { class: 'pill ' + pillClass }, w.flag)),
      el('div', { class: 'subtle' }, w.status)
    ));
  });
  grid.appendChild(left);

  // Right: modality mix + quality
  const right = el('div', { class: 'card' });
  right.appendChild(el('h3', {}, 'Modality mix · this month'));
  const maxCount = Math.max(...Object.values(clinic.modality_mix));
  const mmix = el('div', { class: 'mmix' });
  Object.entries(clinic.modality_mix).forEach(([mod, count]) => {
    mmix.appendChild(el('div', { class: 'mmix-row' },
      el('div', {}, mod),
      el('div', { class: 'mmix-bar' },
        el('div', { class: 'mmix-fill', style: `width: ${(count / maxCount * 100).toFixed(0)}%; height: 100%;` })
      ),
      el('div', { class: 'count' }, count.toString())
    ));
  });
  right.appendChild(mmix);

  right.appendChild(el('h3', { style: 'margin-top: 20px;' }, 'AI + reader quality'));
  right.appendChild(el('div', { style: 'display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px;' },
    stat('AI first-pass agreement', `${(clinic.first_pass_ai_agreement * 100).toFixed(0)}%`, 'Against panel gold-standard'),
    stat('Avg TAT', `${clinic.average_tat_hours}h`, 'Sub-hour on visa CXR'),
  ));

  grid.appendChild(right);
  main.appendChild(grid);
}

// ─────────────────────────────────────────────────────────────
function stat(label, value, sub) {
  return el('div', { class: 'stat' },
    el('div', { class: 'stat-label' }, label),
    el('div', { class: 'stat-value' }, value),
    el('div', { class: 'stat-sub' }, sub)
  );
}

// ─────────────────────────────────────────────────────────────
const views = {
  radiologist: renderRadiologist,
  physician: renderPhysician,
  coordinator: renderCoordinator,
  ops: renderClinicOps,
};

function setRole(role) {
  state.role = role;
  $$('#roleTabs button').forEach((b) => b.classList.toggle('active', b.dataset.role === role));
  views[role]().catch((err) => {
    $('#main').innerHTML = `<div class="card"><h3>Load failed</h3><p>${err.message}</p></div>`;
  });
}

$$('#roleTabs button').forEach((b) => {
  b.addEventListener('click', () => setRole(b.dataset.role));
});

setInterval(() => {
  const d = new Date();
  const t = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  $('#clock').textContent = `${d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })} · ${t} GST`;
}, 1000);

setRole('radiologist');
</script>
